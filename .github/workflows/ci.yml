name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check package versions
        run: npm run check:versions
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (lib + bin)
        run: cargo clippy --workspace -- -D warnings

      - name: Run Clippy (tests, warnings only)
        run: cargo clippy --workspace --tests

      - name: Download onnxruntime (for slop detection at test time)
        run: |
          set -euo pipefail
          curl -fsSL -o ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz
          tar -xzf ort.tgz
          mv onnxruntime-linux-x64-1.23.2 onnxruntime
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Run Rust tests with coverage (html)
        run: |
          mkdir -p coverage
          cargo llvm-cov nextest -p vurst-html-node --all-features \
            --fail-under-lines 100 \
            --ignore-filename-regex 'src/lib\.rs' \
            --lcov --output-path coverage/lcov-html.info

      - name: Run Rust tests with coverage (markdown)
        run: |
          cargo llvm-cov nextest -p vurst-markdown-node --all-features \
            --fail-under-lines 100 \
            --ignore-filename-regex 'src/lib\.rs' \
            --lcov --output-path coverage/lcov-markdown.info

      - name: Run Rust tests with coverage (ai)
        run: |
          cargo llvm-cov nextest -p vurst-ai-node --all-features \
            --fail-under-lines 100 \
            --ignore-filename-regex 'src/lib\.rs' \
            --lcov --output-path coverage/lcov-ai.info

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: coverage/lcov-html.info,coverage/lcov-markdown.info,coverage/lcov-ai.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install node deps (html)
        working-directory: packages/html
        run: npm install

      - name: Build native module (html, debug)
        working-directory: packages/html
        run: npm run build:debug

      - name: Run Node smoke tests (html)
        working-directory: packages/html
        run: npm test

      - name: Install node deps (markdown)
        working-directory: packages/markdown
        run: npm install

      - name: Build native module (markdown, debug)
        working-directory: packages/markdown
        run: npm run build:debug

      - name: Run Node smoke tests (markdown)
        working-directory: packages/markdown
        run: npm test

      - name: Install node deps (ai)
        working-directory: packages/ai
        run: npm install

      - name: Build native module (ai, debug)
        working-directory: packages/ai
        run: npm run build:debug

      - name: Stage onnxruntime dylib next to the ai .node
        run: |
          set -euo pipefail
          mkdir -p packages/ai/onnxruntime/linux-x64
          cp onnxruntime/lib/libonnxruntime.so packages/ai/onnxruntime/linux-x64/libonnxruntime.so

      - name: Run Node smoke tests (ai)
        working-directory: packages/ai
        run: npm test

      - name: Install node deps (runtime)
        working-directory: packages/runtime
        run: npm install

      - name: Run Node tests (runtime)
        working-directory: packages/runtime
        run: node --test __test__/*.test.mjs

  build-smoke:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-ci-${{ matrix.target }}

      - name: Install node deps and build (html)
        working-directory: packages/html
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Install node deps and build (markdown)
        working-directory: packages/markdown
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Install node deps and build (ai)
        working-directory: packages/ai
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}
