name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ONNXRUNTIME_VERSION: 1.23.2

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - name: Install workspace dependencies for package validation
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check package versions
        run: pnpm run check:versions
      - name: Check packed package manifests
        run: pnpm run check:packed-manifests
      - name: Check release workflow
        run: pnpm run check:release-workflow
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release
          cache-bin: 'false'

      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy (lib + bin)
        run: cargo clippy --workspace -- -D warnings

  prepare:
    name: Prepare release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set." >&2
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          npm --prefix packages/html version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/markdown version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/ai version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/prompt version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/runtime version "$version" --allow-same-version --no-git-tag-version
          node -e "
            const fs = require('node:fs');
            const version = process.argv[1];
            for (const path of ['packages/ai/Cargo.toml', 'packages/html/Cargo.toml', 'packages/markdown/Cargo.toml']) {
              const cargo = fs.readFileSync(path, 'utf8')
                .replace(/^version = \".*\"$/m, \`version = \"\${version}\"\`);
              fs.writeFileSync(path, cargo);
            }
          " "$version"
          npm run check:versions
          cargo update -w
          git add package.json scripts/check-versions.mjs
          git add packages/ai/Cargo.toml packages/html/Cargo.toml packages/markdown/Cargo.toml Cargo.lock
          git add packages/ai/package.json packages/html/package.json packages/markdown/package.json packages/prompt/package.json packages/runtime/package.json
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            ort_url_suffix: osx-arm64
            ort_lib_name: libonnxruntime.dylib
            platform_arch_key: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ort_url_suffix: linux-x64
            ort_lib_name: libonnxruntime.so
            platform_arch_key: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ort_url_suffix: linux-aarch64
            ort_lib_name: libonnxruntime.so
            platform_arch_key: linux-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release-${{ matrix.target }}
          cache-bin: 'false'
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download onnxruntime
        shell: bash
        run: |
          set -euo pipefail
          ort_url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-${{ matrix.ort_url_suffix }}-${ONNXRUNTIME_VERSION}.tgz"
          curl -fsSL -o ort.tgz "$ort_url"
          tar -xzf ort.tgz
          mv "onnxruntime-${{ matrix.ort_url_suffix }}-${ONNXRUNTIME_VERSION}" onnxruntime
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime/lib/${{ matrix.ort_lib_name }}" >> "$GITHUB_ENV"

      - name: Build html package
        working-directory: packages/html
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build markdown package
        working-directory: packages/markdown
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build ai package
        working-directory: packages/ai
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }} --js binding.js --dts binding.d.ts

      - name: Stage onnxruntime dylib for the ai npm package
        shell: bash
        run: |
          set -euo pipefail
          dest="packages/ai/onnxruntime/${{ matrix.platform_arch_key }}"
          mkdir -p "$dest"
          cp "onnxruntime/lib/${{ matrix.ort_lib_name }}" "$dest/"

      - name: Upload html artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-html-${{ matrix.target }}
          path: packages/html/*.node
          if-no-files-found: error

      - name: Upload markdown artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-markdown-${{ matrix.target }}
          path: packages/markdown/*.node
          if-no-files-found: error

      - name: Upload ai artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-ai-${{ matrix.target }}
          path: |
            packages/ai/*.node
            packages/ai/onnxruntime/${{ matrix.platform_arch_key }}/${{ matrix.ort_lib_name }}
          if-no-files-found: error

  publish:
    name: Publish
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download html binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-html-*
          path: packages/html
          merge-multiple: true

      - name: Download markdown binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-markdown-*
          path: packages/markdown
          merge-multiple: true

      - name: Download ai binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-ai-*
          path: packages/ai
          merge-multiple: true

      - name: List staged files
        run: |
          ls -la packages/html/
          ls -la packages/markdown/
          ls -la packages/ai/
          ls -la packages/ai/onnxruntime/ || true

      - name: Check package versions
        run: pnpm run check:versions

      - name: Check packed package manifests
        run: pnpm run check:packed-manifests

      - name: Scaffold per-platform packages (html)
        working-directory: packages/html
        run: |
          set -euo pipefail
          npx napi create-npm-dirs
          npx napi artifacts --output-dir .

      - name: Scaffold per-platform packages (markdown)
        working-directory: packages/markdown
        run: |
          set -euo pipefail
          npx napi create-npm-dirs
          npx napi artifacts --output-dir .

      - name: Scaffold per-platform packages (ai)
        working-directory: packages/ai
        run: |
          set -euo pipefail
          npx napi create-npm-dirs
          npx napi artifacts --output-dir .

      - name: Stage onnxruntime dylibs into per-platform ai packages
        shell: bash
        run: |
          set -euo pipefail
          declare -A dylib_by_key=(
            [darwin-arm64]=libonnxruntime.dylib
            [linux-x64]=libonnxruntime.so
            [linux-arm64]=libonnxruntime.so
          )
          declare -A platform_arch_abi_by_key=(
            [darwin-arm64]=darwin-arm64
            [linux-x64]=linux-x64-gnu
            [linux-arm64]=linux-arm64-gnu
          )
          for key in darwin-arm64 linux-x64 linux-arm64; do
            dylib="${dylib_by_key[$key]}"
            platform_arch_abi="${platform_arch_abi_by_key[$key]}"
            dest_dir="packages/ai/npm/$platform_arch_abi/onnxruntime/$key"
            mkdir -p "$dest_dir"
            cp "packages/ai/onnxruntime/$key/$dylib" "$dest_dir/$dylib"
            node -e "
              const fs = require('node:fs');
              const path = process.argv[1];
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (!pkg.files.includes('onnxruntime/')) {
                pkg.files.push('onnxruntime/');
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            " "packages/ai/npm/$platform_arch_abi/package.json"
          done

      - name: List staged per-platform packages
        run: |
          find packages/html/npm packages/markdown/npm packages/ai/npm -maxdepth 2 | sort

      - name: Release smoke test (ai, linux-x64-gnu)
        working-directory: packages/ai
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          smoke_dir="$(mktemp -d)"
          npm pack --pack-destination "$smoke_dir" >/dev/null
          npm pack --pack-destination "$smoke_dir" ./npm/linux-x64-gnu >/dev/null
          consumer_dir="$(mktemp -d)"
          (cd "$consumer_dir" && npm init -y >/dev/null)
          npm install --prefix "$consumer_dir" --no-save \
            "$smoke_dir/jongleberry-vurst-ai-$version.tgz" \
            "$smoke_dir/jongleberry-vurst-ai-linux-x64-gnu-$version.tgz"
          node -e "
            const { detectAiGeneratedText } = require(require('node:path').join(process.argv[1], 'node_modules/@jongleberry/vurst-ai'));
            detectAiGeneratedText(Buffer.from('Release smoke test sentence.')).then((result) => {
              if (typeof result.flagged !== 'boolean') {
                throw new Error('Unexpected result shape: ' + JSON.stringify(result));
              }
              console.log('Release smoke test passed:', JSON.stringify(result));
            });
          " "$consumer_dir"

      - name: Show npm publish state
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          for package in \
            "@jongleberry/vurst-runtime" \
            "@jongleberry/vurst-html" \
            "@jongleberry/vurst-html-darwin-arm64" \
            "@jongleberry/vurst-html-linux-arm64-gnu" \
            "@jongleberry/vurst-html-linux-x64-gnu" \
            "@jongleberry/vurst-markdown" \
            "@jongleberry/vurst-markdown-darwin-arm64" \
            "@jongleberry/vurst-markdown-linux-arm64-gnu" \
            "@jongleberry/vurst-markdown-linux-x64-gnu" \
            "@jongleberry/vurst-prompt" \
            "@jongleberry/vurst-ai" \
            "@jongleberry/vurst-ai-darwin-arm64" \
            "@jongleberry/vurst-ai-linux-arm64-gnu" \
            "@jongleberry/vurst-ai-linux-x64-gnu"
          do
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package $version is already on npm and will be skipped"
            else
              echo "$package $version is not on npm and will be published"
            fi
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.prepare.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

      # Per-platform native packages publish first: `napi prepublish` writes
      # `optionalDependencies` (pointing at these packages, pinned to the
      # current version) into each meta package.json *in this checkout*
      # before its own meta publish step runs below -- so the published meta
      # tarball declares them correctly. Those optionalDependencies are
      # deliberately NOT committed to git: pnpm cannot record a lockfile
      # entry for an optionalDependency that doesn't resolve (it silently
      # excludes it), so committing them before these package names exist on
      # npm makes `pnpm install --frozen-lockfile` fail everywhere, forever
      # (this broke CI on the PR that introduced this workflow). Once a
      # per-platform package has been published at least once, pnpm *can*
      # resolve it -- but re-adding it to source control still isn't
      # necessary, since `napi prepublish` recomputes it from the current
      # version on every release.
      #
      # The meta packages must already exist on npm by the time a consumer
      # installs them, so per-platform packages publish first. `napi
      # prepublish` skips packages it finds already published at this
      # version, so these steps are safe to re-run.
      - name: Publish @jongleberry/vurst-html-* (per-platform)
        working-directory: packages/html
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        shell: bash
        run: npx napi prepublish --no-gh-release --npm-dir npm

      - name: Publish @jongleberry/vurst-markdown-* (per-platform)
        working-directory: packages/markdown
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        shell: bash
        run: npx napi prepublish --no-gh-release --npm-dir npm

      - name: Publish @jongleberry/vurst-ai-* (per-platform)
        working-directory: packages/ai
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        shell: bash
        run: npx napi prepublish --no-gh-release --npm-dir npm

      - name: Publish @jongleberry/vurst-runtime
        working-directory: packages/runtime
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-runtime@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-runtime $version is already on npm; skipping"
          else
            pnpm publish --access public --provenance --no-git-checks
          fi

      - name: Publish @jongleberry/vurst-html
        working-directory: packages/html
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-html@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-html $version is already on npm; skipping"
          else
            pnpm publish --access public --provenance --no-git-checks
          fi

      - name: Publish @jongleberry/vurst-markdown
        working-directory: packages/markdown
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-markdown@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-markdown $version is already on npm; skipping"
          else
            pnpm publish --access public --provenance --no-git-checks
          fi

      - name: Publish @jongleberry/vurst-prompt
        working-directory: packages/prompt
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-prompt@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-prompt $version is already on npm; skipping"
          else
            pnpm publish --access public --provenance --no-git-checks
          fi

      - name: Publish @jongleberry/vurst-ai
        working-directory: packages/ai
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-ai@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-ai $version is already on npm; skipping"
          else
            pnpm publish --access public --provenance --no-git-checks
          fi
