name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ONNXRUNTIME_VERSION: 1.23.2

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release
          cache-bin: 'false'

      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy (lib + bin)
        run: cargo clippy --workspace -- -D warnings

  prepare:
    name: Prepare release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set." >&2
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          npm --prefix packages/html version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/markdown version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/ai version "$version" --allow-same-version --no-git-tag-version
          npm --prefix packages/runtime version "$version" --allow-same-version --no-git-tag-version
          node -e "
            const fs = require('node:fs');
            const version = process.argv[1];
            for (const path of ['packages/ai/Cargo.toml', 'packages/html/Cargo.toml', 'packages/markdown/Cargo.toml']) {
              const cargo = fs.readFileSync(path, 'utf8')
                .replace(/^version = \".*\"$/m, \`version = \"\${version}\"\`);
              fs.writeFileSync(path, cargo);
            }
          " "$version"
          npm run check:versions
          cargo update -w
          git add package.json scripts/check-versions.mjs
          git add packages/ai/Cargo.toml packages/html/Cargo.toml packages/markdown/Cargo.toml Cargo.lock
          git add packages/ai/package.json packages/html/package.json packages/markdown/package.json packages/runtime/package.json
          git commit -m "chore(release): v$version"
          git tag -a "v$version" -m "v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            ort_url_suffix: osx-arm64
            ort_lib_name: libonnxruntime.dylib
            platform_arch_key: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ort_url_suffix: linux-x64
            ort_lib_name: libonnxruntime.so
            platform_arch_key: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ort_url_suffix: linux-aarch64
            ort_lib_name: libonnxruntime.so
            platform_arch_key: linux-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-release-${{ matrix.target }}
          cache-bin: 'false'
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download onnxruntime
        shell: bash
        run: |
          set -euo pipefail
          ort_url="https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-${{ matrix.ort_url_suffix }}-${ONNXRUNTIME_VERSION}.tgz"
          curl -fsSL -o ort.tgz "$ort_url"
          tar -xzf ort.tgz
          mv "onnxruntime-${{ matrix.ort_url_suffix }}-${ONNXRUNTIME_VERSION}" onnxruntime
          echo "ORT_DYLIB_PATH=$PWD/onnxruntime/lib/${{ matrix.ort_lib_name }}" >> "$GITHUB_ENV"

      - name: Build html package
        working-directory: packages/html
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build markdown package
        working-directory: packages/markdown
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build ai package
        working-directory: packages/ai
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}

      - name: Stage onnxruntime dylib for the ai npm package
        shell: bash
        run: |
          set -euo pipefail
          dest="packages/ai/onnxruntime/${{ matrix.platform_arch_key }}"
          mkdir -p "$dest"
          cp "onnxruntime/lib/${{ matrix.ort_lib_name }}" "$dest/"

      - name: Upload html artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-html-${{ matrix.target }}
          path: packages/html/*.node
          if-no-files-found: error

      - name: Upload markdown artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-markdown-${{ matrix.target }}
          path: packages/markdown/*.node
          if-no-files-found: error

      - name: Upload ai artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-ai-${{ matrix.target }}
          path: |
            packages/ai/*.node
            packages/ai/onnxruntime/${{ matrix.platform_arch_key }}/${{ matrix.ort_lib_name }}
          if-no-files-found: error

  publish:
    name: Publish
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies (html)
        working-directory: packages/html
        run: npm install

      - name: Install dependencies (markdown)
        working-directory: packages/markdown
        run: npm install

      - name: Install dependencies (ai)
        working-directory: packages/ai
        run: npm install

      - name: Download html binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-html-*
          path: packages/html
          merge-multiple: true

      - name: Download markdown binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-markdown-*
          path: packages/markdown
          merge-multiple: true

      - name: Download ai binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bindings-ai-*
          path: packages/ai
          merge-multiple: true

      - name: List staged files
        run: |
          ls -la packages/html/
          ls -la packages/markdown/
          ls -la packages/ai/
          ls -la packages/ai/onnxruntime/ || true

      - name: Check package versions
        run: npm run check:versions

      - name: Show npm publish state
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          for package in \
            "@jongleberry/vurst-runtime" \
            "@jongleberry/vurst-html" \
            "@jongleberry/vurst-markdown" \
            "@jongleberry/vurst-ai"
          do
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "$package $version is already on npm and will be skipped"
            else
              echo "$package $version is not on npm and will be published"
            fi
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.prepare.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

      - name: Publish @jongleberry/vurst-runtime
        working-directory: packages/runtime
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-runtime@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-runtime $version is already on npm; skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @jongleberry/vurst-html
        working-directory: packages/html
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-html@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-html $version is already on npm; skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @jongleberry/vurst-markdown
        working-directory: packages/markdown
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-markdown@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-markdown $version is already on npm; skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @jongleberry/vurst-ai
        working-directory: packages/ai
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          if npm view "@jongleberry/vurst-ai@$version" version >/dev/null 2>&1; then
            echo "@jongleberry/vurst-ai $version is already on npm; skipping"
          else
            npm publish --access public --provenance
          fi
