rust:
  - changed-files:
      - any-glob-to-any-file:
          - 'crate/**/*.rs'
          - 'package/**/*.rs'
          - '**/Cargo.toml'
          - '**/Cargo.lock'
          - 'clippy.toml'
          - 'rustfmt.toml'

javascript:
  - changed-files:
      - any-glob-to-any-file:
          - 'package/index.js'
          - 'package/index.d.ts'
          - 'package/package.json'
          - 'package/__test__/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'LICENSE'
          - '**/*.md'
