[package]
name = "vurst-ai-node"
version = "0.2.2"
edition = "2021"
license = "MIT"
publish = false

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vurst-runtime-rs = { path = "../runtime" }
anyhow = "1"
is-it-slop = { version = "=0.5.0", default-features = false }
napi = { version = "3", features = ["serde-json", "tokio_rt"] }
napi-derive = "3"
ort = { version = "=2.0.0-rc.11", default-features = false, features = ["std", "ndarray", "tracing", "load-dynamic"] }
serde_json = "1.0"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

[build-dependencies]
napi-build = "2"
