[package]
name = "vurst-html-node"
version = "0.2.2"
edition = "2021"
license = "MIT"
publish = false

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vurst-runtime-rs = { path = "../runtime" }
ammonia = "4.1.2"
anyhow = "1"
boilerstrip = "0.4"
ego-tree = "0.11"
entities = "1.0.1"
html-escape = "0.2.13"
napi = { version = "3", features = ["serde-json", "tokio_rt"] }
napi-derive = "3"
regex = "1.11"
scraper = "0.27"
serde_json = "1.0"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
vurst-shared = { version = "0.2.0", path = "../shared_rust" }

[build-dependencies]
napi-build = "2"
