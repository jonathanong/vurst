[package]
name = "vurst-markdown-node"
version = "0.0.4"
edition = "2021"
license = "MIT"
publish = false

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
breadchunks = "=0.2.0"
comrak = { version = "0.52", default-features = false }
data-encoding = "2"
ego-tree = "0.11"
hex = "0.4"
hmac = "0.13"
napi = { version = "3", features = ["serde-json", "tokio_rt"] }
napi-derive = "3"
scraper = "0.27"
serde_json = "1.0"
sha2 = "0.11"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

[build-dependencies]
napi-build = "2"
