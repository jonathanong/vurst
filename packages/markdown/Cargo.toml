[package]
name = "vurst-markdown-node"
version = "0.2.0"
edition = "2021"
license = "MIT"
publish = false

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vurst-runtime-rs = { path = "../runtime" }
breadchunks = "=0.2.1"
comrak = { version = "0.52", default-features = false }
ego-tree = "0.11"
psl = "2"
regex = "1.11"
html-escape = "0.2.13"
napi = { version = "3", features = ["serde-json", "tokio_rt"] }
napi-derive = "3"
scraper = "0.27"
serde_json = "1.0"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
vurst-shared = { version = "0.2.0", path = "../shared_rust" }

[build-dependencies]
napi-build = "2"

[dev-dependencies]
data-encoding = "2"
